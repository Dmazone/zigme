<!doctype html>
<html lang="ko">
<head>

  <style>

    .page{min-height:100dvh;padding:12px 12px max(18px,env(safe-area-inset-bottom));background:

    .center{display:grid;gap:10px;text-align:left}

    .choice small{display:block;margin-top:6px;opacity:.78;font-weight:700;line-height:1.35;font-size:11px}
    .m0{background:#fef3c7;color:#07111f}.m1{background:#fce7f3;color:#07111f}.m2{background:#dbeafe;color:#07111f}.m3{background:#ccfbf1;color:#07111f}

    .ad{margin:10px 0;padding:11px;border-radius:8px;background:#151c29;text-align:center;font-weight:900;color:#cbd5e1}
