<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>zigme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;max-width:100%;overflow-x:hidden;background:#f6e8a9;color:#231305;font-family:"Gowun Batang","Noto Sans KR",serif;font-size:20px}
    button{font-family:inherit}
    .preload{opacity:0;pointer-events:none;position:fixed;top:-9999px;left:-9999px;width:0;height:0;overflow:hidden}
    .page{min-height:100dvh;padding:12px 12px max(18px,env(safe-area-inset-bottom));background:
      repeating-linear-gradient(0deg,rgba(129,78,12,.08) 0 1px,transparent 1px 7px),
      linear-gradient(180deg,#fff3b0 0,#ffd6d6 44%,#d9f99d 100%)}
    .wrap{width:100%;max-width:1120px;margin:0 auto;overflow:hidden}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:0 0 10px;padding:2px 2px 0}
    .logo{font-size:34px;font-weight:700;letter-spacing:0;color:#c1121f;text-shadow:2px 2px 0 #fff;margin:0}.tag{font-size:17px;color:#3b2208;margin-top:2px;font-weight:700}
    .pill{border:2px solid #4b2e05;background:#fff8c9;color:#4b1900;border-radius:6px;padding:10px 12px;font-weight:900;cursor:pointer;white-space:nowrap;font-family:"Noto Sans KR",sans-serif}
    .layout{display:grid;grid-template-columns:minmax(0,1fr);gap:10px}
    .layout>*{min-width:0}
    .layout>div{width:calc(100vw - 48px);max-width:430px;justify-self:center}
    .glass{background:#fff7d1;border:3px double #9b2226;border-radius:6px;box-shadow:6px 6px 0 rgba(95,45,0,.28)}
    .tabs{display:grid;grid-template-columns:repeat(4,minmax(82px,1fr));gap:6px;padding:6px;background:#ffcf33;border:2px solid #7c2d12;border-radius:6px;overflow-x:auto}
    .tab{border:2px solid #7c2d12;border-radius:4px;padding:10px 5px;background:#fff8c9;color:#3b2208;font-size:13px;font-weight:900;cursor:pointer;min-height:60px;font-family:"Noto Sans KR",sans-serif}
    .tab i{display:block;margin-bottom:4px}.tab.on{background:#c1121f;color:#fff8c9;box-shadow:inset 0 -4px 0 #ffcf33}
    .panel{padding:12px;min-height:0}
    .panel h2{font-size:27px;line-height:1.3;margin:2px 0 12px;color:#4b1900}
    .center{display:grid;gap:10px;text-align:left}
    .big{width:100%;min-height:88px;border:3px solid #4b1900;border-radius:6px;background:linear-gradient(135deg,#ffeb3b,#ff7b00 52%,#e11d48);color:#350400;font-size:31px;font-weight:900;line-height:1.18;padding:20px;cursor:pointer;box-shadow:5px 5px 0 rgba(75,25,0,.3);font-family:"Noto Sans KR",sans-serif}
    .big:disabled{opacity:.55;cursor:not-allowed}
    @keyframes spin{to{transform:rotate(360deg)}}
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .choice{border:2px solid #7c2d12;border-radius:6px;background:#fff8c9;color:#3b2208;padding:15px 12px;text-align:left;font-weight:900;cursor:pointer;min-height:108px;font-size:20px}
    .choice.on{background:#9b2226;color:#fff8c9;border-color:#4b1900;box-shadow:inset 0 -4px 0 #ffcf33}
    .choice small{display:block;margin-top:7px;opacity:1;font-weight:700;line-height:1.45;font-size:16px}
    .m0{background:#fff176;color:#3b2208}.m1{background:#ffccd5;color:#3b2208}.m2{background:#d9f99d;color:#3b2208}.m3{background:#ffd166;color:#3b2208}
    .side{padding:10px;position:relative;order:-1;min-width:0;width:calc(100vw - 48px);max-width:430px;justify-self:center;overflow:hidden}.sideTop{display:flex;justify-content:space-between;align-items:center;margin:0 0 9px}.muted{font-size:13px;color:#5c3d0c;font-weight:900}.live{background:#c1121f;color:#fff8c9;border-radius:4px;padding:7px 9px;font-size:13px;font-weight:900}
    canvas{display:block;width:100%;max-width:100%;height:auto;aspect-ratio:4/5;background:#ffe9a8;border-radius:3px;image-rendering:pixelated;border:2px solid #7c2d12}
    .ad{margin:10px 0;padding:13px;border-radius:4px;background:#fff8c9;border:2px dashed #9b2226;text-align:center;font-weight:900;color:#4b1900;font-size:18px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{border:2px solid #4b1900;border-radius:6px;padding:17px 8px;font-weight:900;cursor:pointer;font-size:19px;font-family:"Noto Sans KR",sans-serif}.white{background:#fff;color:#4b1900}.cyan{background:#ffcf33;color:#4b1900;grid-column:1/-1}.red{background:#c1121f;color:#fff8c9}
    .footer{display:block;margin-top:10px;border-radius:6px;padding:16px;text-align:center;text-decoration:none;color:#350400;font-weight:900;background:#ffeb3b;border:2px solid #7c2d12;font-size:18px}
    .bar{height:8px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-top:9px}.bar span{display:block;height:100%;background:#67e8f9}
    .toast{margin-top:10px;border-radius:6px;background:#fff8c9;border:2px solid #9b2226;padding:13px;color:#4b1900;font-weight:900;font-size:17px}
    .religionBox{margin-top:14px;padding:13px;border:2px solid #7c2d12;border-radius:6px;background:#fff8c9;color:#3b2208}
    .religionBox label{display:block;font-size:19px;font-weight:900;margin-bottom:8px;color:#9b2226}
    select{width:100%;border:2px solid #4b1900;background:#fff;color:#3b2208;border-radius:6px;padding:14px;font-size:18px;font-weight:900;font-family:"Noto Sans KR",sans-serif}
    .religionMsg{margin-top:10px;padding:12px;border:2px dashed #9b2226;background:#fff3b0;color:#4b1900;font-size:18px;font-weight:900;line-height:1.45;text-align:center}
    .nameGrid{display:grid;grid-template-columns:1fr;gap:8px;margin:10px 0}
    .nameGrid label{display:grid;gap:5px;color:#4b1900;font-size:18px;font-weight:900}
    .nameInput{width:100%;border:2px solid #7c2d12;background:#fff;color:#3b2208;border-radius:6px;padding:14px;font-size:20px;font-weight:900;font-family:"Noto Sans KR",sans-serif}
    .quickMake{margin:10px 0 0;width:100%;background:#c1121f;color:#fff8c9;border-color:#4b1900;font-size:22px}
    .modal{position:fixed;inset:0;z-index:50;background:rgba(59,34,8,.86);display:flex;align-items:center;justify-content:center;padding:14px}.box{width:100%;max-width:430px;border-radius:6px;background:#fff7d1;border:3px double #9b2226;padding:20px;text-align:center;box-shadow:8px 8px 0 rgba(59,34,8,.34);color:#3b2208}
    input{width:100%;border:2px solid #7c2d12;background:#fff;color:#3b2208;border-radius:6px;padding:16px;margin:12px 0;font-size:18px}.count{width:88px;height:88px;margin:0 auto 14px;border-radius:6px;background:#ffcf33;color:#9b2226;border:2px solid #7c2d12;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900}.saveimg{width:100%;border-radius:4px;border:2px solid #7c2d12}.hidden{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}
    @media(max-width:420px){.page{padding-left:8px;padding-right:8px}.side,.layout>div{width:calc(100vw - 48px)}.logo{font-size:30px}.tag{max-width:270px;font-size:15px}.cards{grid-template-columns:1fr}.tab{font-size:12px}.choice{min-height:100px}.big{font-size:27px}.btn{font-size:19px}.quickMake{font-size:21px}}
    @media(min-width:700px){.page{padding:18px 18px 28px}.layout{grid-template-columns:minmax(320px,430px) minmax(0,1fr);align-items:start;gap:14px}.layout>div{width:100%;max-width:none;justify-self:stretch}.side{position:sticky;top:18px;width:100%;max-width:none;justify-self:stretch}.panel{padding:18px;min-height:382px}.top{margin-bottom:14px}.logo{font-size:46px}.tag{font-size:18px}.big{min-height:116px;font-size:36px}.cards{gap:10px}.choice{padding:17px;min-height:122px}.nameGrid{grid-template-columns:1fr 1fr}}
    @media(min-width:1040px){.layout{grid-template-columns:430px minmax(0,1fr);gap:18px}.panel{min-height:438px}.tabs{gap:8px;padding:8px}.tab{font-size:12px}.side{padding:12px}}
  </style>
</head>
<body>
  <div class="preload"><span style="font-family:'Gowun Batang',serif">지그미 바탕 폰트 로딩</span><span>지그미 산세리프 폰트 로딩</span></div>
  <div id="root"><div class="page"><div class="wrap"><div class="logo">zigme</div><p>앱을 여는 중입니다.</p></div></div></div>

  <script>
    (function(){
      function load(src){return new Promise(function(ok,fail){var s=document.createElement("script");s.src=src;s.crossOrigin="anonymous";s.onload=ok;s.onerror=fail;document.head.appendChild(s);});}
      async function boot(){
        try{
          if(!window.React){try{await load("https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js");}catch(e){await load("https://unpkg.com/react@18/umd/react.production.min.js");}}
          if(!window.ReactDOM){try{await load("https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js");}catch(e){await load("https://unpkg.com/react-dom@18/umd/react-dom.production.min.js");}}
          window.startZigme();
        }catch(err){
          document.getElementById("root").innerHTML='<div class="page"><div class="wrap"><h1>zigme</h1><p>React CDN을 불러오지 못했습니다. 새로고침하거나 네트워크를 확인하세요.</p></div></div>';
          console.error(err);
        }
      }
      boot();
    })();
  </script>

        {quote:"웃음 한 번 크게 지으시면 복이 눈치껏 들어옵니다.",subtext:"복 입장 대기중",prompt:"vintage korean ecard flower bouquet sparrow pixelated"},

        {quote:"가정에 평안과 약간의 웃음이 과하게 넘치길 빕니다.",subtext:"엄근진 행복 송신",prompt:"old gif style flowers blue bird sparkles"},
        {quote:"올해도 건강하시고 웃음이 과다 지급되길 빕니다.",subtext:"품격 있는 병맛 축원",prompt:"pixel flower garden bird korean greeting card"},
        {quote:"오늘 하루도 별일 없이 지나가면 이미 큰 승리입니다.",subtext:"조용한 승전보",prompt:"retro low res floral frame bird sparkle card"},
        {quote:"복은 천천히 와도 좋으니 건강은 급행으로 오십시오.",subtext:"장수특급 카드",prompt:"old digital flower bird greeting image dithered"}
      ];
      var MOODS=[{id:"energy",label:"복 기운",icon:"fa-bolt",text:"오늘은 복이 좀 들썩이는 날입니다."},{id:"burnout",label:"기력 보충",icon:"fa-battery-quarter",text:"쉬엄쉬엄 가도 체면은 서는 날입니다."},{id:"empty",label:"평안 기원",icon:"fa-dove",text:"별일 없는 하루가 제일 큰 선물입니다."},{id:"challenge",label:"대박 축원",icon:"fa-seedling",text:"웃기지만 엄숙하게 잘되길 비는 마음입니다."}];
      var TARGETS=[{id:"friend",label:"친구방",icon:"fa-comments",tone:"정겹고 살짝 썰렁하게"},{id:"family",label:"가족방",icon:"fa-house",tone:"따뜻하고 큼직하게"},{id:"work",label:"모임방",icon:"fa-users",tone:"점잖고 부담 없게"},{id:"me",label:"나에게",icon:"fa-user",tone:"근엄하지만 웃기게"}];
      var RELIGIONS=[
        {id:"",label:"없음 / 아직 비공개",messages:["무교도 복은 정중히 접수 가능합니다.","오늘의 평안은 종교란을 비워도 도착합니다."]},
        {id:"catholic",label:"가톨릭",messages:["은총과 평화가 가정에 엄숙히 착석합니다.","성모님의 따뜻한 품처럼 오늘도 평안하십시오."]},
        {id:"protestant",label:"기독교",messages:["주님의 은혜가 오늘 일정표 맨 위에 올라갑니다.","믿음 소망 사랑 중 오늘은 건강도 추가입니다."]},

        {id:"buddhism",label:"불교",messages:["마음 한 번 내려놓으면 복이 조용히 앉습니다.","자비와 평안이 오늘의 방석에 단정히 앉습니다."]},

        {id:"islam",label:"이슬람교",messages:["평화와 자비가 오늘의 길에 함께하길 빕니다.","알라의 자비 안에서 무탈한 하루 되십시오."]},
        {id:"hinduism",label:"힌두교",messages:["삶의 길마다 선한 기운이 차분히 이어지길 빕니다.","오늘의 복이 갠지스 물결처럼 잔잔히 흐릅니다."]},
        {id:"zoroastrianism",label:"조로아스터교",messages:["좋은 생각, 좋은 말, 좋은 행동이 복을 소환합니다.","밝은 불꽃처럼 마음이 꺼지지 않길 빕니다."]},
        {id:"shinto",label:"신토(일본 신도)",messages:["깨끗한 마음과 좋은 인연이 문 앞에 정렬합니다.","오늘의 작은 신성함이 평안을 배달합니다."]},
        {id:"sikhism",label:"시크교",messages:["섬김과 용기의 마음이 오늘을 든든히 세웁니다.","평등한 복이 빠짐없이 가정에 도착합니다."]},
        {id:"jainism",label:"자이나교",messages:["해치지 않는 마음이 가장 조용한 대박입니다.","작은 생명까지 평안한 하루를 기원합니다."]},
        {id:"taoism",label:"도교",messages:["억지로 잡지 않아도 복은 때가 되면 옵니다.","무위의 평안이 오늘의 어깨를 가볍게 합니다."]},
        {id:"judaism",label:"유대교",messages:["샬롬, 평화가 집안 구석구석 점잖게 머물길 빕니다.","지혜와 평안이 오늘 식탁에 함께 앉습니다."]},
        {id:"bahai",label:"바하이교",messages:["인류의 하나됨처럼 집안 화목도 크게 번창하십시오.","다양한 복이 한 줄로 서서 찾아옵니다."]},
        {id:"tenrikyo",label:"천리교",messages:["즐거운 삶의 기운이 오늘 문패를 두드립니다.","서로 돕는 마음이 복의 지름길입니다."]},
        {id:"cheondogyo",label:"천도교",messages:["사람을 하늘처럼 귀히 여기니 복도 고개 숙입니다.","마음속 하늘이 오늘따라 맑기를 빕니다."]},
        {id:"wonbuddhism",label:"원불교",messages:["일상 속 깨달음이 오늘의 안부를 환히 밝힙니다.","마음공부와 밥심이 함께 충만하길 빕니다."]},
        {id:"jeungsan",label:"증산계열",messages:["상생의 기운이 가정에 점잖게 입장합니다.","묵은 걱정은 물러가고 새 기운이 옵니다."]},
        {id:"mormon",label:"예수 그리스도 후기 성도 교회",messages:["가족의 사랑과 평안이 오늘도 단단히 묶입니다.","선한 선택이 복의 이정표가 되길 빕니다."]},
        {id:"jehovah",label:"여호와의 증인",messages:["평화로운 소식처럼 오늘도 무탈하시길 빕니다.","성실한 마음 위에 평안이 머무르길 빕니다."]},
        {id:"unitarian",label:"유니테리언",messages:["다른 믿음도 한 식탁에 앉는 넉넉한 하루 되십시오.","자유로운 마음에 품격 있는 평안이 깃듭니다."]},
        {id:"animism",label:"토착신앙/샤머니즘",messages:["산천초목의 기운까지 동원해 안녕을 빕니다.","조상님도 고개 끄덕일 만한 평안이 오길 빕니다."]},
        {id:"spiritual",label:"영성/명상",messages:["숨을 깊게 쉬면 복도 자세를 고쳐 앉습니다.","고요한 마음이 오늘의 최고 부적입니다."]},
        {id:"minor",label:"기타 소수종교",messages:["이름은 달라도 평안을 바라는 마음은 정중히 같습니다.","각자의 빛으로 오늘 하루를 무탈히 밝히십시오."]}
      ];
      var PHRASE_BANK=[
        {m:"energy",t:"family",o:"newyear",q:"새해 복은 크게 받고 걱정은 작게 접으십시오.",s:"복 접수 완료"},
        {m:"energy",t:"family",o:"health",q:"건강이 앞장서고 웃음이 뒤따르는 날 되십시오.",s:"건강 행진"},
        {m:"energy",t:"friend",o:"fun",q:"웃음 한 번 크게 지으면 복이 신발 신고 들어옵니다.",s:"복 입장 중"},
        {m:"energy",t:"work",o:"daily",q:"오늘 회의보다 건강이 더 중요하니 엄숙히 챙기십시오.",s:"건강 우선"},
        {m:"energy",t:"me",o:"daily",q:"나는 오늘도 무탈하게 버티는 고급 인재입니다.",s:"자기복지"},
